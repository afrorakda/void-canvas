<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Void Canvas</title>
    
    <link rel="icon" href="image_100.png">
    <link rel="apple-touch-icon" href="image_100.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
            --text-gray: #666;
            --void-gray: #bbb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow: hidden; /* 画面にフィットさせる */
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header { margin-bottom: 15px; flex-shrink: 0; }
        h1 { font-size: 1.8rem; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .subtitle { font-size: 0.85rem; color: var(--text-gray); font-weight: 600; margin-top: 4px; }

        .canvas-wrapper { 
            position: relative; 
            flex-grow: 1;
            margin-bottom: 15px;
            overflow: hidden;
        }
        
        textarea {
            width: 100%;
            height: 100%;
            padding: 20px;
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            background: var(--input-bg);
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1.6;
            color: var(--main) !important;
            box-sizing: border-box;
            outline: none;
            resize: none;
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main) !important;
            opacity: 1 !important;
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }
        textarea::placeholder { color: var(--void-gray); -webkit-text-fill-color: var(--void-gray); font-style: italic; }

        /* 霧のように消えるアニメーション */
        .fog-out {
            opacity: 0 !important;
            transform: translateY(-20px) scale(1.02);
            pointer-events: none;
        }

        .void-btn {
            width: 100%;
            background: var(--main);
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: var(--radius);
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 15px;
            flex-shrink: 0;
        }
        .void-btn:active { transform: scale(0.98); opacity: 0.9; }

        .footer-btns { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 15px;
            flex-shrink: 0;
        }
        .kofi-btn {
            flex: 1;
            background: var(--main); color: #fff;
            padding: 12px; border-radius: var(--radius);
            text-decoration: none; font-weight: bold; font-size: 13px;
            display: flex; align-items: center; justify-content: center;
        }
        .home-btn {
            flex: 1;
            background: var(--accent); color: var(--main);
            border: none; padding: 12px;
            border-radius: var(--radius); font-weight: 800; font-size: 12px; 
            cursor: pointer;
        }

        footer { 
            font-size: 10px; 
            color: #aaa; 
            line-height: 1.6; 
            font-weight: 500;
            padding-bottom: 10px;
            flex-shrink: 0;
        }
        footer a { color: inherit; text-decoration: underline; }

        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content {
            background: #fff; width: 85%; max-width: 340px; padding: 30px;
            border-radius: var(--radius); text-align: left; position: relative;
        }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #888; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Void Canvas</h1>
        <p class="subtitle">Write. Release. Let it vanish.</p>
    </header>

    <div class="canvas-wrapper">
        <textarea id="canvas" placeholder="Pour your thoughts here... nothing will be saved."></textarea>
    </div>

    <button class="void-btn" id="voidBtn" onclick="releaseToVoid()">RELEASE TO VOID</button>

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️buy me a coffee</a>
        <button class="home-btn" onclick="showModal()">Add Home</button>
    </div>

    <footer>
        <div>No login / No tracking / No ads / Browser only</div>
        <div><a href="https://afrorakda.com/privacy/">Privacy Policy</a> / afrorakda © 2026</div>
    </footer>
</div>

<div id="modal" onclick="hideModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-x" onclick="hideModal()">×</span>
        <h3>📱 Install</h3>
        <p>Add to your home screen.</p>
        <p>🍏 <strong>iPhone (Safari):</strong><br>Tap Share, then Add to Home Screen.</p>
        <p>🤖 <strong>Android (Chrome):</strong><br>Tap Menu (⋮), then Add to Home Screen.</p>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const voidBtn = document.getElementById('voidBtn');
    let isReleasing = false;

    function releaseToVoid() {
        if (isReleasing || !canvas.value.trim()) return;
        isReleasing = true;

        // 霧のように消えるアニメーション開始
        canvas.classList.add('fog-out');
        voidBtn.innerText = "VANISHING...";
        voidBtn.style.opacity = "0.5";

        setTimeout(() => {
            canvas.value = '';
            canvas.classList.remove('fog-out');
            voidBtn.innerText = "RELEASE TO VOID";
            voidBtn.style.opacity = "1";
            isReleasing = false;
            canvas.focus();
        }, 700);
    }

    // 誤操作による離脱防止（一応確認を出すが、基本は保存しない）
    window.onbeforeunload = function() {
        if (canvas.value.trim()) {
            return "Your thoughts will vanish forever. Is that okay?";
        }
    };

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }
</script>

</body>
</html>
